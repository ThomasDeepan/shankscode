<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shank's Code - Launching Soon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #ffffff;
      }

      /* Enhanced High-End Glassmorphism */
      .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.04),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .glass-inner {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
      }

      /* Text gradient styles */
      .text-gradient-blue {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .text-gradient-dark {
        background: linear-gradient(135deg, #0f172a, #334155);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 overflow-hidden relative"
  >
    <!-- Stylized soft background meshes for depth on white bg -->
    <div
      class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-blue-50 rounded-full filter blur-[120px] opacity-70 pointer-events-none"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-sky-50 rounded-full filter blur-[120px] opacity-60 pointer-events-none"
    ></div>

    <!-- Main Outer Premium Glass Container -->
    <div
      class="glass-card max-w-2xl w-full rounded-[2.5rem] p-10 md:p-16 text-center relative z-10 transition-transform duration-500 hover:scale-[1.01]"
    >
      <!-- Logo Header -->
      <div class="mb-10 flex flex-col items-center">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-3">
          <span class="text-gradient-dark">SHANK'S</span>
          <span class="text-gradient-blue">CODE</span>
        </h1>
        <!-- Animated minimal indicator line -->
        <div
          class="h-[3px] w-12 bg-gradient-to-r from-blue-600 to-sky-400 rounded-full transition-all duration-300 hover:w-20"
        ></div>
      </div>

      <!-- Launching Title -->
      <p
        class="text-xs md:text-sm font-bold text-blue-600 tracking-[0.3em] uppercase mb-10"
      >
        Launching Soon
      </p>

      <!-- Countdown Row -->
      <div class="grid grid-cols-4 gap-4 md:gap-6 my-10">
        <!-- Days -->
        <div
          class="glass-inner flex flex-col p-4 md:p-6 rounded-2xl transition-all duration-300 hover:translate-y-[-4px]"
        >
          <span
            id="days"
            class="text-3xl md:text-5xl font-extrabold text-slate-900 tracking-tight"
            >30</span
          >
          <span
            class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-2"
            >Days</span
          >
        </div>
        <!-- Hours -->
        <div
          class="glass-inner flex flex-col p-4 md:p-6 rounded-2xl transition-all duration-300 hover:translate-y-[-4px]"
        >
          <span
            id="hours"
            class="text-3xl md:text-5xl font-extrabold text-slate-900 tracking-tight"
            >00</span
          >
          <span
            class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-2"
            >Hours</span
          >
        </div>
        <!-- Minutes -->
        <div
          class="glass-inner flex flex-col p-4 md:p-6 rounded-2xl transition-all duration-300 hover:translate-y-[-4px]"
        >
          <span
            id="minutes"
            class="text-3xl md:text-5xl font-extrabold text-slate-900 tracking-tight"
            >00</span
          >
          <span
            class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mt-2"
            >Mins</span
          >
        </div>
        <!-- Seconds -->
        <div
          class="glass-inner flex flex-col p-4 md:p-6 rounded-2xl border-blue-200/50 transition-all duration-300 hover:translate-y-[-4px]"
        >
          <span
            id="seconds"
            class="text-3xl md:text-5xl font-extrabold text-blue-600 tracking-tight"
            >00</span
          >
          <span
            class="text-[10px] md:text-xs font-bold text-blue-500 uppercase tracking-widest mt-2"
            >Secs</span
          >
        </div>
      </div>

      <!-- Minimal Smooth Progress Bar -->
      <div
        class="w-full bg-slate-100 rounded-full h-[6px] mb-10 overflow-hidden p-[1px]"
      >
        <div
          class="bg-gradient-to-r from-blue-500 to-blue-700 h-full rounded-full shadow-[0_0_10px_rgba(37,99,235,0.3)] animate-pulse"
          style="width: 65%"
        ></div>
      </div>

      <!-- Footer Callout -->
      <div class="mt-4">
        <p class="text-xs md:text-sm font-medium text-slate-500 tracking-wide">
          We're building something exceptional. Stay tuned.
        </p>
      </div>
    </div>

    <!-- Core Logic Script -->
    <script>
      // FIXED TARGET DATE: Change this specific date whenever you want to move the deadline.
      // Setting it to June 20, 2026, ensures a consistent continuous countdown on Hostinger.
      const launchDate = new Date("June 20, 2026 00:00:00").getTime();

      function updateCountdown() {
        const now = new Date().getTime();
        const difference = launchDate - now;

        if (difference <= 0) {
          clearInterval(timerInterval);
          document.getElementById("days").innerText = "00";
          document.getElementById("hours").innerText = "00";
          document.getElementById("minutes").innerText = "00";
          document.getElementById("seconds").innerText = "00";
          return;
        }

        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor(
          (difference % (1000 * 60 * 60)) / (1000 * 60),
        );
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days
          .toString()
          .padStart(2, "0");
        document.getElementById("hours").innerText = hours
          .toString()
          .padStart(2, "0");
        document.getElementById("minutes").innerText = minutes
          .toString()
          .padStart(2, "0");
        document.getElementById("seconds").innerText = seconds
          .toString()
          .padStart(2, "0");
      }

      // Initialize immediately and run every second
      updateCountdown();
      const timerInterval = setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
